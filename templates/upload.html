<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus-Cyber | Defender Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Fira Code', monospace;
            background-color: #050505;
        }

        .scan-glow {
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
        }

        .danger-glow {
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.6);
        }

        .neon-text-green {
            text-shadow: 0 0 10px rgba(34, 197, 94, 0.8);
        }

        .neon-text-red {
            text-shadow: 0 0 10px rgba(239, 68, 68, 0.8);
        }

        @keyframes pulse-red {

            0%,
            100% {
                background-color: rgba(255, 0, 0, 0.1);
            }

            50% {
                background-color: rgba(255, 0, 0, 0.4);
            }
        }

        .animate-pulse-red {
            animation: pulse-red 1.5s infinite;
        }
    </style>
</head>

<body class="text-gray-300 min-h-screen flex flex-col items-center justify-center p-4 transition-colors duration-500"
    id="main-body">

    <!-- Emergency Overlay -->
    <div id="danger-overlay"
        class="fixed inset-0 z-50 pointer-events-none hidden flex flex-col items-center justify-center bg-red-900 bg-opacity-30 border-[20px] border-red-600 animate-pulse-red">
        <h1 class="text-white text-6xl md:text-9xl font-black neon-text-red mb-4">BREACH DETECTED</h1>
        <p class="text-white text-2xl md:text-4xl font-bold uppercase tracking-widest">Malicious Code Executed in
            Sandbox</p>
    </div>

    <div
        class="max-w-2xl w-full space-y-8 bg-zinc-900 bg-opacity-80 p-10 rounded-2xl border border-zinc-800 scan-glow relative overflow-hidden">

        <!-- Header -->
        <div class="text-center space-y-2 relative z-10">
            <h1 class="text-4xl font-bold tracking-tighter text-green-500 neon-text-green">NEXUS-CYBER</h1>
            <p class="text-zinc-500 text-sm uppercase tracking-[0.3em]">Autonomous Defense Gateway</p>
        </div>

        <!-- System Monitor -->
        <div class="grid grid-cols-2 gap-4 text-xs font-mono">
            <div class="p-3 bg-black rounded border border-zinc-800">
                <span class="text-zinc-500">ENGINE:</span> <span class="text-green-400">TETRAGON EBPF</span>
            </div>
            <div class="p-3 bg-black rounded border border-zinc-800">
                <span class="text-zinc-500">ANALYSIS:</span> <span class="text-green-400">LLAMA-3 ACTIVE</span>
            </div>
        </div>

        <!-- Upload Section -->
        <div class="relative z-10">
            <form action="/upload" method="POST" enctype="multipart/form-data" class="space-y-6">
                <div class="group relative">
                    <label for="file-upload"
                        class="flex flex-col items-center justify-center w-full h-40 border-2 border-dashed border-zinc-700 rounded-xl cursor-pointer hover:border-green-500 hover:bg-zinc-800 transition-all duration-300">
                        <div class="flex flex-col items-center justify-center pt-5 pb-6">
                            <svg class="w-10 h-10 mb-3 text-zinc-500 group-hover:text-green-400" fill="none"
                                stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12">
                                </path>
                            </svg>
                            <p class="mb-2 text-sm text-zinc-400">DROP PAYLOAD FOR ANALYSIS</p>
                            <p class="text-xs text-zinc-600 uppercase">Binary, Script, or Source</p>
                        </div>
                        <input id="file-upload" name="file" type="file" class="hidden" />
                    </label>
                </div>

                <button type="submit"
                    class="w-full bg-green-900 bg-opacity-20 hover:bg-green-600 hover:text-black py-4 rounded-xl border border-green-500 text-green-500 font-bold tracking-widest transition-all duration-300 focus:outline-none focus:ring-2 focus:ring-green-400">
                    EXECUTE SECURE UPLOAD
                </button>
            </form>
        </div>

        <!-- Status Result -->
        {% if message %}
        <div
            class="p-4 rounded-lg text-center font-bold border-2 {% if 'MALICIOUS' in message %}bg-red-900 bg-opacity-20 border-red-500 text-red-500 neon-text-red{% else %}bg-green-900 bg-opacity-20 border-green-500 text-green-500 neon-text-green{% endif %}">
            {{ message }}
        </div>
        {% endif %}

        <!-- Footer -->
        <div class="text-center pt-4 opacity-30 text-[10px]">
            &copy; 2026 NEXUS-CYBER / DEEP-AI INTEGRATION / ASUSTEK HW-SYNC
        </div>
    </div>

    <script>
        // Real-time Status Polling
        const dangerOverlay = document.getElementById('danger-overlay');
        const mainBody = document.getElementById('main-body');

        async function checkStatus() {
            try {
                const response = await fetch('/status');
                const data = await response.json();

                if (data.status === 'MALICIOUS') {
                    dangerOverlay.classList.remove('hidden');
                    // Add extra shake effect
                    mainBody.classList.add('bg-red-950');
                } else {
                    dangerOverlay.classList.add('hidden');
                    mainBody.classList.remove('bg-red-950');
                }
            } catch (error) {
                console.error('Polling error:', error);
            }
        }

        // Poll every 2 seconds
        setInterval(checkStatus, 2000);
    </script>
</body>

</html>
