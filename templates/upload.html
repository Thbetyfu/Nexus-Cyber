<!DOCTYPE html>
<html>
<head>
    <title>Nexus-Cyber Upload Gateway</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0d1117; color: #c9d1d9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background-color: #161b22; padding: 40px; border-radius: 12px; border: 1px solid #30363d; box-shadow: 0 8px 32px rgba(0,0,0,0.5); text-align: center; width: 400px; }
        h1 { color: #58a6ff; margin-bottom: 24px; }
        input[type="file"] { margin: 20px 0; color: #8b949e; }
        input[type="submit"] { background-color: #238636; color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; transition: background 0.2s; }
        input[type="submit"]:hover { background-color: #2ea043; }
        .status { margin-top: 20px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Nexus-Cyber</h1>
        <p>Upload file to quarantine for AI analysis</p>
        <form action="/upload" method="post" enctype="multipart/form-data">
            <input type="file" name="file"><br>
            <input type="submit" value="Upload & Scan">
        </form>
        {% if message %}
        <div class="status">{{ message }}</div>
        {% endif %}
    </div>
</body>
</html>
